<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Overlay Clima + Hora</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
}

.container {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 10px 15px;
    backdrop-filter: blur(6px);
}

.hora {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
}

.clima {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 22px;
}

.clima img {
    width: 40px;
    height: 40px;
}
</style>

</head>
<body>

<div class="container">
    <div class="hora" id="hora">--:--</div>
    <div class="clima">
        <img id="icone" src="">
        <span id="temp">--°C</span>
    </div>
</div>

<script>
// ===== HORA =====
function atualizarHora() {
    const agora = new Date();
    const h = String(agora.getHours()).padStart(2, '0');
    const m = String(agora.getMinutes()).padStart(2, '0');
    document.getElementById("hora").innerText = `${h}:${m}`;
}
setInterval(atualizarHora, 1000);
atualizarHora();

// ===== CLIMA (Open-Meteo - sem API KEY) =====
async function carregarClima() {
    try {
        // Leme - SP
        const lat = -22.18;
        const lon = -47.39;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

        const res = await fetch(url);
        const data = await res.json();

        const temp = Math.round(data.current_weather.temperature);
        const code = data.current_weather.weathercode;

        document.getElementById("temp").innerText = `${temp}°C`;

        // Mapeamento simples de ícones
        let icon = "01d";

        if ([0].includes(code)) icon = "01d"; // sol
        else if ([1,2,3].includes(code)) icon = "02d"; // parcialmente nublado
        else if ([45,48].includes(code)) icon = "50d"; // neblina
        else if ([51,53,55,61,63,65].includes(code)) icon = "10d"; // chuva
        else if ([71,73,75].includes(code)) icon = "13d"; // neve
        else if ([95,96,99].includes(code)) icon = "11d"; // tempestade

        document.getElementById("icone").src =
            `https://openweathermap.org/img/wn/${icon}@2x.png`;

    } catch (e) {
        console.log("Erro clima:", e);
    }
}

carregarClima();
setInterval(carregarClima, 600000); // atualiza a cada 10 min
</script>

</body>
</html>
